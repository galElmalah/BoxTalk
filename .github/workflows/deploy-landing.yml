name: Deploy Landing

on:
  push:
    branches: [main]
    paths:
      - "apps/sites/landing/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/deploy-landing.yml"
  # Re-deploy after a release is published so the landing's build-time
  # GitHub API fetch picks up the new version + DMG link.
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-landing
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build landing site
        run: pnpm -F @boxtalk/site build
        env:
          # Optional: lift the GitHub API rate limit for the build-time
          # release fetch in apps/sites/landing/src/pages/index.astro.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # NB: wrangler-action@v3 tries `pnpm exec wrangler` first, which fails in
      # this pnpm workspace (wrangler isn't a workspace dep), then tries
      # `pnpm add wrangler` at the root, which pnpm refuses without `-w`.
      # Side-step the action and call wrangler directly via npx.
      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@^3 pages deploy apps/sites/landing/dist --project-name=boxtalk --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
