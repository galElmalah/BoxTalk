name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build but do not create a release"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-mac:
    name: Build (macOS)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        run: pnpm -F @boxtalk/app dist:mac
        env:
          # Unsigned build — electron-builder skips notarization when identity is null
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: boxtalk-mac
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest-mac.yml
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd apps/desktop/release
          # Glob may not match latest-mac.yml on first run; ignore if absent.
          assets=( *.dmg *.zip )
          [[ -f latest-mac.yml ]] && assets+=( latest-mac.yml )
          gh release create "${GITHUB_REF_NAME}" \
            --title "BoxTalk ${GITHUB_REF_NAME}" \
            --generate-notes \
            "${assets[@]}"
