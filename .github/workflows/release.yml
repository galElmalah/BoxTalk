name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build but do not create a release"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-mac:
    name: Build (macOS)
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- Desktop app (DMG) -------------------------------------------------

      # Signing + notarization auto-enable as soon as CSC_LINK is set in repo
      # secrets. Until then, force `identity=null` on the CLI — otherwise
      # electron-builder receives CSC_LINK="" (GitHub Actions sets env vars
      # for empty secrets too) and tries to read the empty string as a file
      # path, crashing with "apps/desktop not a file" before we ever reach
      # the signing stage. The CLI override bypasses the env-var path
      # entirely on unsigned runs.
      - name: Build desktop app
        run: |
          if [ -n "$CSC_LINK" ]; then
            pnpm -F @boxtalk/app dist:mac
          else
            pnpm -F @boxtalk/app dist:mac -- --config.mac.identity=null
          fi
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' && 'true' || 'false' }}

      # --- vibevoice-cli (downloaded on demand by the desktop app) ----------
      #
      # The DMG ships without VibeVoice. The desktop app pulls this binary from
      # the matching release asset the first time a user loads a VibeVoice
      # model (see apps/desktop/vibevoice.js). Build it here so the release
      # carries one prebuilt per arch.

      - name: Build vibevoice-cli
        run: node apps/desktop/scripts/build-vibevoice.mjs

      - name: Stage vibevoice-cli as release asset
        run: |
          src=apps/desktop/vendor/vibevoice.cpp/build/bin/vibevoice-cli
          dest=apps/desktop/release/vibevoice-cli-darwin-$(uname -m)
          cp "$src" "$dest"
          chmod +x "$dest"
          ls -la apps/desktop/release/

      # --- Upload + release --------------------------------------------------

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: boxtalk-mac
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest-mac.yml
            apps/desktop/release/vibevoice-cli-*
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd apps/desktop/release
          assets=( *.dmg *.zip vibevoice-cli-* )
          [[ -f latest-mac.yml ]] && assets+=( latest-mac.yml )
          gh release create "${GITHUB_REF_NAME}" \
            --title "BoxTalk ${GITHUB_REF_NAME}" \
            --generate-notes \
            "${assets[@]}"
